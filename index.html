<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>n1otev</title>

  <!-- IMPORTANT: relative path only -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="container">
    <header>
      <h1>n1otev</h1>
      <p class="subtitle">Roblox Scripter — systems, UI, optimization</p>
    </header>

    <main>
      <section>
        <h2>Projects</h2>
        <div id="projects"></div>
      </section>

      <section class="skills">
        <h2>Skills</h2>
        <div class="tags">
          <span class="tag">Lua</span>
          <span class="tag">Roblox API</span>
          <span class="tag">UI Systems</span>
          <span class="tag">Optimization</span>
          <span class="tag">DataStores</span>
        </div>
      </section>

      <section class="contact">
        <h2>Contact</h2>
        <p>
          Discord: <b>n1otev</b><br>
          GitHub:
          <a href="https://github.com/drelchl" target="_blank">
            github.com/drelchl
          </a>
        </p>
      </section>
    </main>

    <footer>
      © 2026 n1otev
    </footer>
  </div>

  <!-- JS (also safe relative path) -->
  <script src="./script.js"></script>

  <!-- PROJECT LOADER (safe + debug-proof) -->
  <script>
    async function loadProjects() {
      try {
        const res = await fetch("./projects.json");

        if (!res.ok) {
          throw new Error("projects.json not found");
        }

        const projects = await res.json();
        const container = document.getElementById("projects");

        projects.forEach(p => {
          const div = document.createElement("div");
          div.className = "project";

          div.innerHTML = `
            <h3>${p.title}</h3>
            <p>${p.description}</p>
          `;

          div.onclick = () => openModal(p);

          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("projects").innerHTML =
          "<p style='color:#ff4d4d;'>Failed to load projects.json</p>";
      }
    }

    function openModal(project) {
      const modal = document.createElement("div");
      modal.className = "modal";

      modal.innerHTML = `
        <div class="modal-content">
          <h2>${project.title}</h2>
          <p>${project.description}</p>

          <video controls autoplay>
            <source src="${project.video}" type="video/mp4">
          </video>

          <button onclick="document.querySelector('.modal').remove()">
            Close
          </button>
        </div>
      `;

      modal.onclick = (e) => {
        if (e.target === modal) modal.remove();
      };

      document.body.appendChild(modal);
    }

    loadProjects();
  </script>

</body>
</html>
